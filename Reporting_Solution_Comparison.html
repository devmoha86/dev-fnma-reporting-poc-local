<div id="app"></div>

<script>
// ── RENDER ENGINE ─────────────────────────────────────────────────────────────

const tagMap = { fe: 'tag-fe', be: 'tag-be', mixed: 'tag-mixed' };

function effortRows(rows) {
  return rows.map(r => {
    if (r.tag === 'subtotal') return `<tr class="subtotal"><td>${r.component}</td><td class="mono">${r.est}</td><td>${r.layer}</td></tr>`;
    if (r.tag === 'grand')    return `<tr class="grand"><td>${r.component}</td><td class="mono">${r.est}</td><td>${r.layer}</td></tr>`;
    const tagClass = tagMap[r.tag] || '';
    return `<tr><td>${r.component}</td><td class="mono">${r.est}</td><td>${tagClass ? `<span class="tag ${tagClass}">${r.layer}</span>` : r.layer}</td></tr>`;
  }).join('');
}

function mdItems(items, type) {
  const isM = type === 'merit';
  return items.map((item, i) => `
    <div class="md-item">
      <div class="md-num ${isM ? 'num-merit' : 'num-demerit'}">${i + 1}</div>
      <div class="md-text">
        <h4 class="${isM ? 'merit-title' : 'demerit-title'}">${item.title}</h4>
        <p>${item.body}</p>
      </div>
    </div>`).join('');
}

function mdBlock(optKey, label, badgeClass) {
  const d = DATA.meritsDemerits[optKey];
  return `
    <div class="opt-section-header" style="margin-top:28px">
      <span class="opt-badge ${badgeClass}" style="font-size:11px;padding:4px 12px">${label}</span>
      <div class="line"></div>
      <span style="font-size:12px;color:var(--muted)">Merits &amp; De-merits</span>
    </div>
    <div class="md-grid">
      <div class="md-card">
        <div class="md-card-header md-merit-hdr">✓ &nbsp;Merits</div>
        ${mdItems(d.merits, 'merit')}
      </div>
      <div class="md-card">
        <div class="md-card-header md-demerit-hdr">✗ &nbsp;De-merits</div>
        ${mdItems(d.demerits, 'demerit')}
      </div>
    </div>`;
}

function compRows(rows) {
  return rows.map(r => `
    <tr>
      <td>${r.dim}</td>
      <td><span class="${r.opt1.signal}">${signalLabel(r.opt1.signal)}</span> ${r.opt1.text}</td>
      <td><span class="${r.opt2.signal}">${signalLabel(r.opt2.signal)}</span> ${r.opt2.text}</td>
    </tr>`).join('');
}

function signalLabel(s) {
  return s === 'good' ? '✓' : s === 'warn' ? '⚠' : '✗';
}

function render() {
  const h = DATA.header;
  const v = DATA.verdict;
  const e = DATA.effort;

  document.getElementById('app').innerHTML = `

    <header class="page-header">
      <div class="eyebrow">${h.eyebrow}</div>
      <h1>${h.title}</h1>
      <div class="sub">${h.subtitle}</div>
      <div class="meta">${h.meta.map(m => `<span class="meta-pill">${m}</span>`).join('')}</div>
    </header>

    <div class="container">

      <div class="toolbar">
        <button class="btn btn-print" onclick="window.print()">🖨 Print / Export PDF</button>
      </div>

      <div class="verdict">
        <div class="verdict-icon">🏁</div>
        <div class="verdict-body">
          <h3>${v.title}</h3>
          <p>${v.text}</p>
        </div>
      </div>

      <div class="section-label">Build Effort Estimation — per dashboard</div>
      <div class="effort-grid">
        <div class="effort-card">
          <div class="effort-card-header ech-1">
            <span>${e.opt1.label}</span>
            <span class="total-badge">${e.opt1.total}</span>
          </div>
          <table class="effort-table">
            <thead><tr><th>Component</th><th>Est.</th><th>Layer</th></tr></thead>
            <tbody>${effortRows(e.opt1.rows)}</tbody>
          </table>
        </div>
        <div class="effort-card">
          <div class="effort-card-header ech-2">
            <span>${e.opt2.label}</span>
            <span class="total-badge">${e.opt2.total}</span>
          </div>
          <table class="effort-table">
            <thead><tr><th>Component</th><th>Est.</th><th>Layer</th></tr></thead>
            <tbody>${effortRows(e.opt2.rows)}</tbody>
          </table>
        </div>
      </div>

      ${mdBlock('opt1', 'Option 1 — Angular + Python', 'badge-1')}
      ${mdBlock('opt2', 'Option 2 — Tableau', 'badge-2')}

      <div class="section-label" style="margin-top:36px">Side-by-side comparison</div>
      <div class="comp-wrap">
        <table class="comp-table">
          <thead>
            <tr>
              <th>Dimension</th>
              <th class="th1">Option 1 — Angular + Python</th>
              <th class="th2">Option 2 — Tableau</th>
            </tr>
          </thead>
          <tbody>${compRows(DATA.comparison)}</tbody>
        </table>
      </div>

      <div class="decision-section">
        <h3>Decision summary &amp; next steps</h3>
        <div class="decision-grid">
          ${DATA.decision.map(d => `
            <div class="decision-item">
              <div class="di-label">${d.label}</div>
              <p>${d.text}</p>
            </div>`).join('')}
        </div>
      </div>

      <div class="draft-badge">${DATA.footer}</div>
    </div>`;
}

render();
</script>
</body>
</html>
