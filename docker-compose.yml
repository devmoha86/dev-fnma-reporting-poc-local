version: '3.9'
services:
  backend:
    build:
      context: ./backend
    container_name: fnma-reporting-backend
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4.1-nano}
      - CORS_ALLOW_ORIGINS=http://localhost:4200
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./angular-app
    container_name: fnma-reporting-frontend
    environment:
      - API_URL=${API_URL:-http://localhost:8000}
    depends_on:
      - backend
    ports:
      - "4200:4200"
